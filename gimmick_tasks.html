<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gimmick — Task Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;--surface3:#26262a;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
    --text:#e8e8e6;--text-muted:#888884;--text-dim:#444441;
    --accent:#c8f060;--accent-dim:rgba(200,240,96,0.12);--accent-text:#0e0e0f;
    --danger:#ff5c5c;--danger-dim:rgba(255,92,92,0.12);
    --toggle-bg:#26262a;--toggle-knob:#888884;
  }
  [data-theme="light"] {
    --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0eeea;--surface3:#e8e5e0;
    --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.2);
    --text:#1a1a18;--text-muted:#6b6b66;--text-dim:#b0aea8;
    --accent:#5a8a00;--accent-dim:rgba(90,138,0,0.1);--accent-text:#ffffff;
    --danger:#d93025;--danger-dim:rgba(217,48,37,0.1);
    --toggle-bg:#e8e5e0;--toggle-knob:#6b6b66;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .2s,color .2s}
  .topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);transition:background .2s,border-color .2s}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .logo-mark svg{width:14px;height:14px}
  .logo-text{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.02em}
  .logo-sub{font-size:12px;color:var(--text-muted);margin-left:4px}
  .topbar-right{display:flex;align-items:center;gap:16px}
  .progress-wrap{display:flex;align-items:center;gap:10px}
  .progress-track{width:120px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;transition:background .2s}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s,background .2s}
  .progress-label{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);min-width:44px;text-align:right}

  /* THEME TOGGLE */
  .theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .toggle-icon{font-size:13px;color:var(--text-muted)}
  .toggle-track{width:36px;height:20px;border-radius:10px;background:var(--toggle-bg);border:1px solid var(--border2);position:relative;transition:background .2s,border-color .2s;flex-shrink:0}
  .toggle-knob{width:14px;height:14px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:2px;left:2px;transition:transform .2s,background .2s}
  [data-theme="light"] .toggle-knob{transform:translateX(16px);background:var(--accent)}

  .filters-bar{padding:10px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surface);transition:background .2s,border-color .2s}
  .filter-label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-right:4px;text-transform:uppercase;letter-spacing:.07em}
  .filter-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:4px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
  .filter-btn:hover{color:var(--text)}
  .filter-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:196px;flex-shrink:0;border-right:1px solid var(--border);padding:14px 10px;overflow-y:auto;background:var(--surface);display:flex;flex-direction:column;gap:2px;transition:background .2s,border-color .2s}
  .sidebar-title{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin-bottom:6px}
  .sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .12s}
  .sidebar-item:hover,.sidebar-item.active{background:var(--surface2)}
  .sidebar-item.active .sidebar-dot-label{color:var(--text)}
  .sidebar-dot-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted)}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .sidebar-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)}
  .sidebar-divider{height:1px;background:var(--border);margin:8px 4px}
  .sidebar-add-area{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--text-dim);font-size:13px;transition:all .15s;border:1px dashed var(--border2);margin-top:4px}
  .sidebar-add-area:hover{color:var(--text-muted);border-color:var(--border3)}
  .board{flex:1;overflow-y:auto;padding:20px 24px}
  .area-section{margin-bottom:28px}
  .area-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .area-toggle{cursor:pointer;display:flex;align-items:center;gap:8px;flex:1;user-select:none}
  .chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;display:inline-block}
  .chevron.open{transform:rotate(90deg)}
  .area-name{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;font-weight:500}
  .area-line{flex:1;height:1px;background:var(--border)}
  .area-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s}
  .area-section:hover .area-actions{opacity:1}
  .icon-btn{width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:13px;transition:all .15s;padding:0}
  .icon-btn:hover{background:var(--surface3);color:var(--text-muted)}
  .icon-btn.danger:hover{background:var(--danger-dim);color:var(--danger)}
  .tasks-grid{display:flex;flex-direction:column;gap:5px}
  .task-card{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:border-color .15s,background .15s;position:relative}
  .task-card:hover{border-color:var(--border2);background:var(--surface2)}
  .task-card:hover .task-del{opacity:1}
  .task-card.done{opacity:.38}
  .p-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;cursor:pointer}
  .checkbox{width:15px;height:15px;border-radius:4px;border:1px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .checkbox.checked{background:var(--accent);border-color:var(--accent)}
  .check-svg{width:9px;height:9px;stroke:var(--accent-text);stroke-width:2.5;fill:none}
  .task-name{font-size:13.5px;color:var(--text);line-height:1.45;flex:1;cursor:text;outline:none}
  .task-name:focus{color:var(--accent)}
  .task-card.done .task-name{text-decoration:line-through;color:var(--text-dim)}
  .task-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:var(--text-dim);font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
  .task-del:hover{background:var(--danger-dim);color:var(--danger)}
  .add-task-row{display:flex;align-items:center;gap:10px;padding:8px 13px;border:1px dashed var(--border2);border-radius:8px;opacity:.5;transition:opacity .15s;margin-top:3px}
  .add-task-row:hover,.add-task-row:focus-within{opacity:1}
  .add-task-input{background:transparent;border:none;outline:none;font-size:13px;color:var(--text-muted);font-family:'DM Sans',sans-serif;flex:1}
  .add-task-input::placeholder{color:var(--text-dim)}
  .empty-board{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim)}
  .empty-board p{font-size:14px}
  .empty-board button{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--accent-dim);color:var(--accent);cursor:pointer;transition:all .15s}
  .empty-board button:hover{background:var(--accent);color:var(--accent-text)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center}
  [data-theme="light"] .modal-overlay{background:rgba(0,0,0,.35)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:360px;display:flex;flex-direction:column;gap:16px;transition:background .2s}
  .modal-title{font-size:15px;font-weight:500}
  .modal-field{display:flex;flex-direction:column;gap:8px}
  .modal-label{font-size:12px;color:var(--text-muted)}
  .modal-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s,background .2s}
  .modal-input:focus{border-color:var(--accent)}
  .color-swatches{display:flex;gap:8px;flex-wrap:wrap}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
  .swatch.selected{border-color:var(--text)}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
  .btn{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 16px;border-radius:7px;cursor:pointer;border:1px solid var(--border2);transition:all .15s}
  .btn-cancel{background:transparent;color:var(--text-muted)}
  .btn-cancel:hover{color:var(--text)}
  .btn-confirm{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
  .btn-confirm:hover{background:var(--accent);color:var(--accent-text)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="4.5" height="4.5" rx="1" fill="var(--accent-text)"/>
        <rect x="8.5" y="1" width="4.5" height="4.5" rx="1" fill="var(--accent-text)"/>
        <rect x="1" y="8.5" width="4.5" height="4.5" rx="1" fill="var(--accent-text)"/>
        <circle cx="10.75" cy="10.75" r="2.25" fill="var(--accent-text)"/>
      </svg>
    </div>
    <span class="logo-text">GIMMICK <span class="logo-sub">/ task board</span></span>
  </div>
  <div class="topbar-right">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
    <div class="theme-toggle" onclick="toggleTheme()" title="Cambia tema">
      <span class="toggle-icon" id="theme-icon">☀</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
    </div>
  </div>
</div>

<div class="filters-bar">
  <span class="filter-label">Vista</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Tutti</button>
  <button class="filter-btn" onclick="setFilter('high',this)">Alta priorità</button>
  <button class="filter-btn" onclick="setFilter('todo',this)">Da fare</button>
  <button class="filter-btn" onclick="setFilter('done',this)">Completati</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Aree</div>
    <div id="sidebar-nav"></div>
    <div class="sidebar-add-area" onclick="openAddArea()">
      <span style="font-size:15px;line-height:1">+</span>
      <span>Nuova area</span>
    </div>
  </div>
  <div class="board" id="board"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nuova area</div>
    <div class="modal-field">
      <div class="modal-label">Nome</div>
      <input class="modal-input" id="modal-name" placeholder="es. Canvas"/>
    </div>
    <div class="modal-field">
      <div class="modal-label">Colore</div>
      <div class="color-swatches" id="modal-swatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn btn-confirm" id="modal-confirm" onclick="confirmModal()">Aggiungi</button>
    </div>
  </div>
</div>

<script>
const COLORS_DARK =['#7b8cff','#40c88a','#c87bff','#f0a030','#ff7b9c','#60d4f0','#ff5c5c','#f5c842','#888884','#ff9f60'];
const COLORS_LIGHT=['#4a5fd4','#1a8a5a','#9040cc','#c07010','#c04070','#0090b0','#c02010','#b09000','#666660','#c06020'];
const P_COLORS={high:'#ff5c5c',mid:'#f0a030',low:'#40c88a'};
const P_COLORS_LIGHT={high:'#d93025',mid:'#c07010',low:'#2a7a40'};
const P_CYCLE={high:'mid',mid:'low',low:'high'};
const P_LABELS={high:'Alta',mid:'Media',low:'Bassa'};

let theme=localStorage.getItem('gimmick-theme')||'dark';
let areas=[];
let tasks=[];
let filter='all',collapsed={},activeArea='all',nextId=1,nextAreaId=1,selectedColor='',modalMode=null,editingAreaId=null;

function applyTheme(){
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-icon').textContent=theme==='dark'?'☀':'☾';
  localStorage.setItem('gimmick-theme',theme);
}

function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  applyTheme();
  render();
}

function getColors(){return theme==='dark'?COLORS_DARK:COLORS_LIGHT;}
function getPColors(){return theme==='dark'?P_COLORS:P_COLORS_LIGHT;}

function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function openAddArea(){
  modalMode='add';editingAreaId=null;selectedColor=getColors()[0];
  document.getElementById('modal-title').textContent='Nuova area';
  document.getElementById('modal-name').value='';
  document.getElementById('modal-confirm').textContent='Aggiungi';
  buildSwatches();document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-name').focus(),50);
}

function openEditArea(id){
  const a=areas.find(a=>a.id===id);if(!a)return;
  modalMode='edit';editingAreaId=id;selectedColor=a.color;
  document.getElementById('modal-title').textContent='Modifica area';
  document.getElementById('modal-name').value=a.label;
  document.getElementById('modal-confirm').textContent='Salva';
  buildSwatches();document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-name').focus(),50);
}

function buildSwatches(){
  const w=document.getElementById('modal-swatches');w.innerHTML='';
  getColors().forEach(c=>{
    const s=document.createElement('div');
    s.className='swatch'+(c===selectedColor?' selected':'');
    s.style.background=c;
    s.onclick=()=>{selectedColor=c;buildSwatches();};
    w.appendChild(s);
  });
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function confirmModal(){
  const name=document.getElementById('modal-name').value.trim();if(!name)return;
  if(modalMode==='add'){areas.push({id:'a'+(nextAreaId++),label:name,color:selectedColor});}
  else{const a=areas.find(a=>a.id===editingAreaId);if(a){a.label=name;a.color=selectedColor;}}
  closeModal();render();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('modal-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal();});

function deleteArea(id){if(!confirm('Eliminare l\'area e tutti i suoi task?'))return;areas=areas.filter(a=>a.id!==id);tasks=tasks.filter(t=>t.area!==id);if(activeArea===id)activeArea='all';render();}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;render();}}
function cyclePriority(id){const t=tasks.find(t=>t.id===id);if(t){t.priority=P_CYCLE[t.priority];render();}}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);render();}

function addTask(areaId,inp){
  const name=inp.value.trim();if(!name)return;
  tasks.push({id:nextId++,area:areaId,name,priority:'mid',done:false});
  inp.value='';render();
  setTimeout(()=>{const el=document.querySelector(`[data-add-area="${areaId}"]`);if(el)el.focus();},30);
}

function toggleCollapse(id){collapsed[id]=!collapsed[id];render();}

function scrollToArea(id){
  activeArea=id;render();
  if(id!=='all'){setTimeout(()=>{const el=document.getElementById('area-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},30);}
  else{document.getElementById('board').scrollTop=0;}
}

function filteredTasks(areaId){
  let t=tasks.filter(t=>t.area===areaId);
  if(filter==='high')t=t.filter(t=>t.priority==='high'&&!t.done);
  if(filter==='todo')t=t.filter(t=>!t.done);
  if(filter==='done')t=t.filter(t=>t.done);
  return t;
}

function render(){
  const pc=getPColors();
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  document.getElementById('progress-label').textContent=done+' / '+total;
  document.getElementById('progress').style.width=(total?Math.round(done/total*100):0)+'%';

  const nav=document.getElementById('sidebar-nav');nav.innerHTML='';
  if(areas.length>0){
    const allTodo=tasks.filter(t=>!t.done).length;
    const allEl=document.createElement('div');allEl.className='sidebar-item'+(activeArea==='all'?' active':'');allEl.onclick=()=>scrollToArea('all');
    allEl.innerHTML=`<span class="sidebar-dot-label"><span class="dot" style="background:var(--text-dim)"></span>Tutti</span><span class="sidebar-count">${allTodo}</span>`;
    nav.appendChild(allEl);
    nav.appendChild(Object.assign(document.createElement('div'),{className:'sidebar-divider'}));
    areas.forEach(area=>{
      const count=tasks.filter(t=>t.area===area.id&&!t.done).length;
      const el=document.createElement('div');el.className='sidebar-item'+(activeArea===area.id?' active':'');el.onclick=()=>scrollToArea(area.id);
      el.innerHTML=`<span class="sidebar-dot-label"><span class="dot" style="background:${area.color}"></span>${area.label}</span><span class="sidebar-count">${count}</span>`;
      nav.appendChild(el);
    });
  }

  const board=document.getElementById('board');board.innerHTML='';
  if(areas.length===0){
    board.innerHTML=`<div class="empty-board"><p>Nessuna area ancora.</p><button onclick="openAddArea()">+ Crea la prima area</button></div>`;
    return;
  }

  let hasAny=false;
  areas.forEach(area=>{
    const areaTasks=filteredTasks(area.id);
    if(filter!=='all'&&!areaTasks.length)return;
    hasAny=true;
    const isCollapsed=collapsed[area.id];
    const section=document.createElement('div');section.className='area-section';section.id='area-'+area.id;
    const header=document.createElement('div');header.className='area-header';
    const tog=document.createElement('div');tog.className='area-toggle';tog.onclick=()=>toggleCollapse(area.id);
    tog.innerHTML=`<span class="chevron ${isCollapsed?'':'open'}">&#9654;</span><span class="area-name" style="color:${area.color}">${area.label}</span><span class="area-line"></span><span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim)">${areaTasks.length}</span>`;
    const acts=document.createElement('div');acts.className='area-actions';
    acts.innerHTML=`<button class="icon-btn" title="Modifica" onclick="openEditArea('${area.id}')">✎</button><button class="icon-btn danger" title="Elimina" onclick="deleteArea('${area.id}')">✕</button>`;
    header.appendChild(tog);header.appendChild(acts);section.appendChild(header);

    if(!isCollapsed){
      const grid=document.createElement('div');grid.className='tasks-grid';
      areaTasks.forEach(t=>{
        const card=document.createElement('div');card.className='task-card'+(t.done?' done':'');
        const pd=document.createElement('div');pd.className='p-dot';pd.style.background=pc[t.priority];pd.title='Priorità '+P_LABELS[t.priority]+' — click per cambiare';pd.onclick=()=>cyclePriority(t.id);
        const cb=document.createElement('div');cb.className='checkbox'+(t.done?' checked':'');cb.onclick=()=>toggleTask(t.id);
        if(t.done)cb.innerHTML=`<svg class="check-svg" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2"/></svg>`;
        const ne=document.createElement('div');ne.className='task-name';ne.contentEditable=true;ne.spellcheck=false;ne.textContent=t.name;
        ne.onblur=()=>{t.name=ne.textContent.trim()||t.name;};
        ne.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();ne.blur();}};
        ne.onclick=e=>e.stopPropagation();
        const db=document.createElement('button');db.className='task-del';db.innerHTML='✕';db.title='Elimina task';db.onclick=()=>deleteTask(t.id);
        card.appendChild(pd);card.appendChild(cb);card.appendChild(ne);card.appendChild(db);grid.appendChild(card);
      });
      const addRow=document.createElement('div');addRow.className='add-task-row';
      const plus=document.createElement('span');plus.style.cssText='font-size:14px;color:var(--text-dim);line-height:1;flex-shrink:0';plus.textContent='+';
      const inp=document.createElement('input');inp.className='add-task-input';inp.placeholder='Aggiungi task…';inp.setAttribute('data-add-area',area.id);
      inp.onkeydown=e=>{if(e.key==='Enter')addTask(area.id,inp);if(e.key==='Escape'){inp.value='';inp.blur();}};
      addRow.appendChild(plus);addRow.appendChild(inp);grid.appendChild(addRow);section.appendChild(grid);
    }
    board.appendChild(section);
  });
  if(!hasAny)board.innerHTML='<div class="empty-board"><p>Nessun task in questa vista.</p></div>';
}

applyTheme();
render();
</script>
</body>
</html>
