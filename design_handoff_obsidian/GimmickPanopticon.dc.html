  get ICONS() {

  buildGraph(W, H) {
    let seed = 20260627;
    const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    const gauss = () => (rnd() + rnd() + rnd() - 1.5) / 1.5;

    const clampX = (x) => Math.max(26, Math.min(W - 26, x));
    const clampY = (y) => Math.max(22, Math.min(H - 22, y));
    const hubsDef = [
      { name: 'GOLFO DEL SOLE', t: 'violet', ang: -0.5, dist: 0.30, n: 52 },
      { name: 'ORTANO MARE', t: 'blue', ang: 0.55, dist: 0.40, n: 44 },
      { name: 'MONEY', t: 'green', ang: 1.65, dist: 0.34, n: 24 },
      { name: 'FAMIGLIA', t: 'amber', ang: 2.55, dist: 0.40, n: 30 },
      { name: 'CONTRATTI', t: 'red', ang: 3.4, dist: 0.32, n: 20 },
      { name: 'CASA', t: 'grey', ang: 4.25, dist: 0.42, n: 34 },
      { name: 'IDEE', t: 'violet', ang: 5.2, dist: 0.30, n: 26 }
    ];
    const R = Math.min(W, H);
    const nodes = [], edges = [], hubs = [];
    // super hub
    hubs.push({ x: cx, y: cy, r: 17, t: 'violet', name: 'GIMMICK', label: true });
    hubsDef.forEach((hd) => {
      const hx = clampX(cx + Math.cos(hd.ang) * hd.dist * R);
      const hy = clampY(cy + Math.sin(hd.ang) * hd.dist * R * 0.86);
      const hub = { x: hx, y: hy, r: 11, t: hd.t, name: hd.name, label: true };
      hubs.push(hub);
      edges.push({ x1: cx, y1: cy, x2: hx, y2: hy, hub: true });
      for (let i = 0; i < hd.n; i++) {
        const a = rnd() * Math.PI * 2;
        const dd = (0.12 + Math.abs(gauss()) * 0.9) * 0.16 * R;
        const nx = clampX(hx + Math.cos(a) * dd);
        const ny = clampY(hy + Math.sin(a) * dd);
        const sub = rnd() < 0.08;
        const n = { x: nx, y: ny, r: sub ? 7 + rnd() * 3 : 3 + rnd() * 3, t: rnd() < 0.6 ? hd.t : pickType(), sq: rnd() < 0.34 };
        nodes.push(n);
        edges.push({ x1: hx, y1: hy, x2: nx, y2: ny });
        if (sub) { const m = 2 + Math.floor(rnd() * 4); for (let k = 0; k < m; k++) { const a2 = rnd() * Math.PI * 2; const d2 = 14 + rnd() * 30; const mx = clampX(nx + Math.cos(a2) * d2); const my = clampY(ny + Math.sin(a2) * d2); nodes.push({ x: mx, y: my, r: 3 + rnd() * 2, t: rnd() < 0.5 ? n.t : pickType(), sq: rnd() < 0.34 }); edges.push({ x1: nx, y1: ny, x2: mx, y2: my }); } }
      }
    });
    // dense core around super-hub
    for (let i = 0; i < 34; i++) {
      const a = rnd() * Math.PI * 2; const dd = 16 + Math.abs(gauss()) * 46;
      const nx = clampX(cx + Math.cos(a) * dd), ny = clampY(cy + Math.sin(a) * dd);
      nodes.push({ x: nx, y: ny, r: 3 + rnd() * 3, t: pickType(), sq: rnd() < 0.34 });
      edges.push({ x1: cx, y1: cy, x2: nx, y2: ny });
    }
    return { nodes, edges, hubs };
  }

  graphSvg(T, W, H) {

    const g = this.buildGraph(W, H);

    });
    const hubEls = [];
    g.hubs.forEach((hb, i) => {
      const col = T.node[hb.t];
      hubEls.push(h('circle', { key: 'h' + i, cx: hb.x, cy: hb.y, r: hb.r, fill: T.dark ? col + '33' : col + '26', stroke: col, strokeWidth: 1.6 }));
      hubEls.push(h('circle', { key: 'hc' + i, cx: hb.x, cy: hb.y, r: Math.max(2.4, hb.r * 0.26), fill: col }));
    });
    const labelEls = g.hubs.map((hb, i) => h('g', { key: 'l' + i },
      h('rect', { x: hb.x - (hb.name.length * 3.1 + 7), y: hb.y + hb.r + 4, width: hb.name.length * 6.2 + 14, height: 16, rx: 4, fill: T.dark ? 'rgba(20,20,20,0.82)' : 'rgba(255,255,255,0.86)', stroke: T.line }),
      h('text', { x: hb.x, y: hb.y + hb.r + 15, textAnchor: 'middle', fill: T.text, style: { fontSize: '9px', fontWeight: 700, letterSpacing: '0.06em', fontFamily: "'Geist',sans-serif" } }, hb.name)));

  view() {

}
