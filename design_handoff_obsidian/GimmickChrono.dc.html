  get ICONS() {

  readable(hex) { let x = hex.replace('#', ''); const r = parseInt(x.slice(0, 2), 16), g = parseInt(x.slice(2, 4), 16), b = parseInt(x.slice(4, 6), 16); return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? '#1b1923' : '#ffffff'; }

  fillFor(c, T) {
    const solid = (this.props.tileColor || 'tint') === 'solid';
    if (solid) {

      const dim = ink === '#ffffff' ? 'rgba(255,255,255,0.82)' : 'rgba(0,0,0,0.58)';

      days.map((d, i) => {

          items.map((a, j) => {

          }));
      })
    );

    // time grid body

      hours.map((x, i) => h('div', { key: x, style: { position: 'absolute', top: (i * H - 6) + 'px', right: '6px', fontSize: '10px', fontFamily: "'Geist Mono',monospace", color: T.subtle } }, i === 0 ? '' : (x < 10 ? '0' + x : x) + ':00')));

      const blocks = evs.map((e, j) => {

    const notes = [
