      h('div', { style: { width: '34px', height: '34px', borderRadius: '9px', background: T.surface2, display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.muted, flexShrink: 0 } }, this.glyph(icon, 16)),
      h('div', { style: { flex: 1, minWidth: 0 } }, h('div', { style: { fontSize: '14px', fontWeight: 600, color: T.text } }, label), sub ? h('div', { style: { fontSize: '11.5px', color: T.subtle, marginTop: '1px' } }, sub) : null), control);
    const seg = (items) => h('div', { style: { display: 'flex', gap: '3px', background: T.surface2, border: '1px solid ' + T.line, borderRadius: '10px', padding: '3px' } },
      items.map((s) => h('div', { key: s[0], style: { flex: 1, textAlign: 'center', padding: '8px 6px', borderRadius: '7px', fontSize: '12.5px', fontWeight: s[1] ? 600 : 500, color: s[1] ? T.accent : T.muted, background: s[1] ? T.accentSoft : 'transparent' } }, s[0])));
    const segRow = (label, control) => h('div', { style: { background: T.surface, border: '1px solid ' + T.line, borderRadius: '12px', padding: '13px 14px', marginBottom: '9px' } },
      h('div', { style: { fontSize: '13px', fontWeight: 600, color: T.text, marginBottom: '10px' } }, label), control);
    const body = h('div', { className: 'gm-s', style: { flex: 1, overflowY: 'auto', padding: '12px 16px 24px' } },
      h('div', { style: { display: 'flex', flexDirection: 'column', gap: '9px' } },
        row('vibrate', 'Feedback aptico', 'Vibrazione su cattura e invio', this.toggle(T, true)),
        row('trash', 'Conferma eliminazione', null, this.toggle(T, true)),
        row('bell', 'Notifiche', 'Promemoria e scadenze', this.toggle(T, false))),
      sh('ASPETTO'),
      segRow('Tema', seg([['Light', true], ['Dark', false], ['Sistema', false]])),
      segRow('Colore tile', seg([['Tinta', true], ['Pieno', false]])),
      sh('GENERALE'),
      h('div', { style: { display: 'flex', flexDirection: 'column', gap: '9px' } },
        row('globe', 'Lingua', 'Italiano', this.glyph('chevR', 15, T.faint)),
        row('action', 'Beniamino assistente', 'Bito', this.glyph('chevR', 15, T.faint))));
    return body;
  }

  phone(T, active, contentFn) {
    const h = React.createElement;
    return h('div', { style: { width: '380px', height: '812px', borderRadius: '40px', background: T.bezel, padding: '7px', boxShadow: '0 40px 90px -50px rgba(0,0,0,0.6)' } },
      h('div', { style: { width: '100%', height: '100%', borderRadius: '34px', overflow: 'hidden', background: T.canvas, display: 'flex', flexDirection: 'column', fontFamily: "'Geist',ui-sans-serif,system-ui,sans-serif", WebkitFontSmoothing: 'antialiased' } },
        this.statusBar(T), this.topNav(T, active), contentFn.call(this, T), this.navPill(T)));
  }
  frame(key, x, T, active, fn, y) { return React.createElement('div', { key: key, style: { position: 'absolute', left: x + 'px', top: (y || 64) + 'px', width: '380px' } }, this.phone(T, active, fn)); }
  label(text, x, y) { return React.createElement('div', { key: text, 'data-drags-parent': '1', style: { position: 'absolute', left: x + 'px', top: (y || 20) + 'px', fontSize: '13px', fontWeight: 600, color: '#46434f' } }, text); }

  view() {
    const h = React.createElement; const L = this.tok(false), D = this.tok(true); const G = 440; const Y2 = 980;
    return h(React.Fragment, {},
      this.label('Tiles · Light', 0), this.frame('t', 0, L, 'tiles', this.tilesView),
      this.label('Flows · Light', G), this.frame('f', G, L, 'flows', this.flowsView),
      this.label('Chrono · Light', G * 2), this.frame('c', G * 2, L, 'chrono', this.chronoView),
      this.label('Settings · Light', G * 3), this.frame('s', G * 3, L, 'gear', this.settingsView),
      this.label('Tiles · Dark', 0, Y2 - 44), this.frame('td', 0, D, 'tiles', this.tilesView, Y2),
      this.label('Flows · Dark', G, Y2 - 44), this.frame('fd', G, D, 'flows', this.flowsView, Y2),
      this.label('Chrono · Dark', G * 2, Y2 - 44), this.frame('cd', G * 2, D, 'chrono', this.chronoView, Y2),
      this.label('Settings · Dark', G * 3, Y2 - 44), this.frame('sd', G * 3, D, 'gear', this.settingsView, Y2)
    );
  }
  renderVals() { return { view: this.view() }; }
}
