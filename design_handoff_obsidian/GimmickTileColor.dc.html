<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} html,body{margin:0;}</style>
</helmet>

<div>{{ view }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  get ICONS() {
    const S = (b) => '<svg viewBox="0 0 16 16" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">' + b + '</svg>';
    return {
      voice: S('<rect x="6" y="2.2" width="4" height="7.2" rx="2"/><path d="M3.8 8a4.2 4.2 0 0 0 8.4 0M8 12.2v1.6"/>'),
      file: S('<path d="M11.5 7.5 8 11a2.4 2.4 0 0 1-3.4-3.4l4-4a1.6 1.6 0 0 1 2.3 2.3l-4 4a.8.8 0 0 1-1.2-1.2L9 5.6"/>'),
      tag: S('<path d="M2.6 7.7V3.3a.7.7 0 0 1 .7-.7h4.4a1 1 0 0 1 .7.3l5 5a1 1 0 0 1 0 1.4l-4.4 4.4a1 1 0 0 1-1.4 0l-5-5a1 1 0 0 1-.3-.7Z"/><circle cx="5.5" cy="5.5" r="0.7" fill="currentColor" stroke="none"/>')
    };
  }
  glyph(name, size, color) { const px = (size || 14) + 'px'; return React.createElement('span', { style: { width: px, height: px, display: 'inline-flex', flexShrink: 0, color: color || 'inherit' }, dangerouslySetInnerHTML: { __html: this.ICONS[name] } }); }

  readable(hex) { let x = hex.replace('#', ''); const r = parseInt(x.slice(0, 2), 16), g = parseInt(x.slice(2, 4), 16), b = parseInt(x.slice(4, 6), 16); return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6 ? '#1b1923' : '#ffffff'; }

  tokens(dark) {
    return dark ? {
      canvas: '#161616', surface: '#1e1e1e', surface2: '#262626', head: '#242424',
      text: '#dcdcdc', muted: '#9a9a9a', subtle: '#6e6e6e',
      line: 'rgba(255,255,255,0.08)', line2: 'rgba(255,255,255,0.13)',
      timed: '#74D6A2', allday: '#7AA7F5', deadline: '#F08D89', anytime: '#9aa0ad', amber: '#E7C25E', accent: '#AB9FF2',
      tintA: '26', borderA: '4d', dark: true
    } : {
      canvas: '#ffffff', surface: '#ffffff', surface2: '#f3f2f6', head: '#fbfbfc',
      text: '#1b1923', muted: '#5c5868', subtle: '#9a96a4',
      line: 'rgba(24,20,38,0.08)', line2: 'rgba(24,20,38,0.13)',
      timed: '#3FAE72', allday: '#4F86EE', deadline: '#E0544F', anytime: '#7e8694', amber: '#C99220', accent: '#7C5CCB',
      tintA: '17', borderA: '40', dark: false
    };
  }

  // returns style fragments for a given treatment + color
  styleFor(tr, c, T) {
    if (tr === 'edge') return { wrap: { background: T.surface, border: '1px solid ' + T.line, borderLeft: '2.5px solid ' + c }, title: T.text, meta: T.muted, dot: c, accentText: T.text, topBar: null };
    if (tr === 'tint') return { wrap: { background: c + T.tintA, border: '1px solid transparent' }, title: T.text, meta: T.dark ? T.muted : c, dot: c, accentText: c, topBar: null };
    if (tr === 'solid') { const ink = this.readable(c); return { wrap: { background: c, border: '1px solid transparent' }, title: ink, meta: ink === '#ffffff' ? 'rgba(255,255,255,0.78)' : 'rgba(0,0,0,0.55)', dot: ink, accentText: ink, topBar: null, solid: true }; }
    if (tr === 'dot') return { wrap: { background: T.surface, border: '1px solid ' + T.line }, title: T.text, meta: T.muted, dot: c, accentText: c, topBar: null };
    if (tr === 'topbar') return { wrap: { background: T.surface, border: '1px solid ' + T.line }, title: T.text, meta: T.muted, dot: c, accentText: T.text, topBar: c };
    return {};
  }

  eventBlock(T, tr, e) {
    const h = React.createElement;
    const c = e.amber ? T.amber : ({ timed: T.timed, allday: T.allday, deadline: T.deadline })[e.kind];
    const s = this.styleFor(tr, c, T);
    return h('div', { key: e.title, style: Object.assign({ borderRadius: '7px', overflow: 'hidden', position: 'relative', padding: tr === 'topbar' ? '8px 9px 7px' : '6px 9px', display: 'flex', flexDirection: 'column', gap: '2px' }, s.wrap) },
      s.topBar ? h('div', { style: { position: 'absolute', top: 0, left: 0, right: 0, height: '3px', background: s.topBar } }) : null,
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } },
        (tr === 'dot' || tr === 'tint') ? h('span', { style: { width: '6px', height: '6px', borderRadius: e.kind === 'deadline' ? '2px' : '50%', background: s.dot, flexShrink: 0 } }) : null,
        h('span', { style: { fontSize: '11.5px', fontWeight: 600, color: s.title, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flex: 1 } }, e.title)),
      h('span', { style: { fontSize: '9.5px', fontFamily: "'Geist Mono',monospace", color: s.meta } }, e.time)
    );
  }

  allDayChip(T, tr, a) {
    const h = React.createElement;
    const c = ({ allday: T.allday, deadline: T.deadline })[a.kind];
    const s = this.styleFor(tr === 'solid' ? 'solid' : (tr === 'topbar' ? 'tint' : tr), c, T);
    return h('div', { key: a.title, style: Object.assign({ display: 'flex', alignItems: 'center', gap: '5px', borderRadius: '5px', padding: '3px 7px', minWidth: 0 }, s.wrap, tr === 'edge' ? { borderLeft: '2.5px solid ' + c } : {}) },
      h('span', { style: { width: '5px', height: '5px', borderRadius: a.kind === 'deadline' ? '1px' : '50%', background: s.dot, flexShrink: 0 } }),
      h('span', { style: { fontSize: '10px', fontWeight: 500, color: s.title, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, a.title));
  }

  tileCard(T, tr, t) {
    const h = React.createElement;
    const tagC = t.tag === 'amber' ? T.amber : T.accent;
    const actC = ({ notes: T.subtle, anytime: T.anytime })[t.kind];
    const s = this.styleFor(tr, tagC, T);
    return h('div', { key: t.title, style: Object.assign({ width: '152px', borderRadius: '8px', overflow: 'hidden', position: 'relative', padding: tr === 'topbar' ? '11px 10px 9px' : '9px 10px', display: 'flex', flexDirection: 'column', gap: '9px' }, s.wrap, tr === 'edge' ? { borderLeft: '2.5px solid ' + tagC } : {}) },
      s.topBar ? h('div', { style: { position: 'absolute', top: 0, left: 0, right: 0, height: '3px', background: s.topBar } }) : null,
      h('div', { style: { fontSize: '12px', lineHeight: '15px', fontWeight: 500, color: s.title, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' } }, t.title),
      t.checklist ? h('div', { style: { display: 'flex', gap: '3px' } }, t.checklist.map((d, i) => h('div', { key: i, style: { flex: 1, height: '4px', borderRadius: '2px', background: d ? (s.solid ? s.title : T.timed) : (s.solid ? 'rgba(255,255,255,0.25)' : T.line2) } }))) : null,
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } },
        h('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: s.solid ? s.title : actC, flexShrink: 0 } }),
        h('span', { style: { fontSize: '10px', fontWeight: 600, color: s.meta } }, t.actionLabel),
        h('div', { style: { flex: 1 } }),
        t.spark ? this.glyph(t.spark, 12, s.solid ? s.title : (t.spark === 'voice' ? T.deadline : T.amber)) : null,
        h('div', { style: { width: '12px', height: '12px', color: s.solid ? s.title : tagC } }, this.glyph('tag', 12))));
  }

  cluster(T, tr) {
    const h = React.createElement;
    const EV = [
      { title: 'Audio e incontro con Marco', time: '17:00 – 18:00', kind: 'timed' },
      { title: 'GDS/bisdomini', time: '12:15 – 13:15', kind: 'timed', amber: true },
      { title: 'Aruba — certificato', time: 'scadenza · oggi', kind: 'deadline' }
    ];
    const AD = [{ title: 'Incontro su IA', kind: 'allday' }, { title: 'Contatto isibrix', kind: 'allday' }];
    const tiles = [
      { title: 'Appuntamento con Marco Guerrieri', actionLabel: 'Notes', kind: 'notes', tag: 'violet', spark: 'voice' },
      { title: 'Revoca certificato Aruba', actionLabel: 'To do', kind: 'anytime', tag: 'amber', spark: 'file', checklist: [true, true, false] }
    ];
    return h('div', { style: { flex: 1, background: T.canvas, border: '1px solid ' + (T.dark ? 'rgba(0,0,0,0.4)' : 'rgba(24,20,38,0.1)'), borderRadius: '12px', padding: '14px', display: 'flex', flexDirection: 'column', gap: '12px' } },
      h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '5px' } }, AD.map((a) => this.allDayChip(T, tr, a))),
      h('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px' } }, EV.map((e) => this.eventBlock(T, tr, e))),
      h('div', { style: { height: '1px', background: T.line } }),
      h('div', { style: { display: 'flex', gap: '10px' } }, tiles.map((t) => this.tileCard(T, tr, t))));
  }

  section(num, name, note, tr) {
    const h = React.createElement;
    return h('div', { style: { marginBottom: '30px' } },
      h('div', { style: { display: 'flex', alignItems: 'baseline', gap: '11px', marginBottom: '12px' } },
        h('span', { style: { fontFamily: "'Geist Mono',monospace", fontSize: '13px', fontWeight: 600, color: '#9a96a4' } }, num),
        h('span', { style: { fontSize: '19px', fontWeight: 600, letterSpacing: '-0.015em', color: '#1b1923' } }, name),
        h('span', { style: { fontSize: '13px', color: '#8a8694' } }, note)),
      h('div', { style: { display: 'flex', gap: '20px', alignItems: 'stretch' } },
        h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column' } }, h('div', { style: { fontSize: '9px', fontWeight: 700, letterSpacing: '0.18em', color: '#9a96a4', marginBottom: '8px' } }, 'LIGHT'), this.cluster(this.tokens(false), tr)),
        h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column' } }, h('div', { style: { fontSize: '9px', fontWeight: 700, letterSpacing: '0.18em', color: '#9a96a4', marginBottom: '8px' } }, 'DARK'), this.cluster(this.tokens(true), tr))));
  }

  view() {
    const h = React.createElement;
    const head = h('div', { style: { marginBottom: '34px' } },
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '11px', marginBottom: '14px' } },
        h('div', { style: { width: '24px', height: '24px', borderRadius: '7px', background: '#7C5CCB', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, h('div', { style: { width: '8px', height: '8px', borderRadius: '2.5px', background: '#fff' } })),
        h('span', { style: { fontSize: '12px', fontWeight: 600, letterSpacing: '0.16em', color: '#7a7589' } }, 'GIMMICK · COLORE DEI TILE')),
      h('h1', { style: { margin: '0 0 8px', fontSize: '34px', fontWeight: 700, letterSpacing: '-0.03em', color: '#1b1923' } }, 'Come il colore evidenzia i tile · 5 vie'),
      h('p', { style: { margin: 0, fontSize: '15px', lineHeight: 1.55, color: '#5c5868', maxWidth: '720px' } }, 'Stessi neutri, stessa palette d\u2019azione (Timed verde · All Day blu · Deadline rosso · To do grigio · tag viola/ambra), stessi raggi e tipografia. Cambia solo dove e quanto entra il colore \u2014 dai blocchi calendario alle tile-card.'));
    const sections = [
      this.section('01', 'Edge', 'barra colore sul lato, corpo neutro \u2014 l\u2019attuale', 'edge'),
      this.section('02', 'Soft tint', 'velatura di colore su tutto il blocco, niente bordo', 'tint'),
      this.section('03', 'Solid', 'pieno saturo, testo in contrasto \u2014 massima evidenza', 'solid'),
      this.section('04', 'Dot only', 'corpo neutro, colore solo nel punto e nella label', 'dot'),
      this.section('05', 'Top bar', 'corpo neutro con barretta colorata in alto', 'topbar')
    ];
    return h('div', { style: { minHeight: '100%', background: '#eceaef', fontFamily: "'Geist',ui-sans-serif,system-ui,sans-serif", WebkitFontSmoothing: 'antialiased', padding: '48px 40px 80px' } },
      h('div', { style: { maxWidth: '1080px', margin: '0 auto' } }, head, ...sections));
  }

  renderVals() { return { view: this.view() }; }
}
</script>
</body>
</html>
