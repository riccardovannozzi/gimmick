        h('div', { style: { flex: 1, textAlign: 'center', padding: '12px', borderRadius: '12px', border: '1px solid ' + T.line2, fontSize: '14px', fontWeight: 500, color: T.muted } }, 'Annulla'),
        h('div', { style: { width: '58px', height: '58px', borderRadius: '50%', background: col, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 10px 24px -8px ' + col } }, h('div', { style: { width: '20px', height: '20px', borderRadius: '4px', background: '#fff' } })),
        h('div', { style: { flex: 1, textAlign: 'center', padding: '12px', borderRadius: '12px', background: T.accent, color: T.accentInk, fontSize: '14px', fontWeight: 600 } }, 'Salva spark')));
    return h('div', { style: { position: 'absolute', inset: 0, zIndex: 10 } },
      h('div', { style: { position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.42)' } }), sheet);
  }

  phone(T, opts) {
    const h = React.createElement;
    return h('div', { style: { width: '380px', height: '812px', borderRadius: '40px', background: T.bezel, padding: '7px', boxShadow: '0 40px 90px -50px rgba(0,0,0,0.6)' } },
      h('div', { style: { width: '100%', height: '100%', borderRadius: '34px', overflow: 'hidden', background: T.canvas, display: 'flex', flexDirection: 'column', fontFamily: "'Geist',ui-sans-serif,system-ui,sans-serif", WebkitFontSmoothing: 'antialiased' } },
        this.statusBar(T), this.appHeader(T), this.home(T, opts), this.navPill(T)));
  }
  frame(key, x, T, opts) {
    return React.createElement('div', { key: key, style: { position: 'absolute', left: x + 'px', top: '64px', width: '380px' } }, this.phone(T, opts));
  }
  groupLabel(text, x) {

  }

  view() {
    const h = React.createElement;
    const L = this.tok(false), D = this.tok(true);
    const G = 440;
    return h(React.Fragment, {},
      this.groupLabel('Home · Light', 0),
      this.frame('hl', 0, L, {}),
      this.groupLabel('Home · Dark', G),
      this.frame('hd', G, D, {}),
      this.groupLabel('Set options aperto', G * 2),
      this.frame('so', G * 2, L, { options: true }),
      this.groupLabel('Drawer aperto', G * 3),
      this.frame('dr', G * 3, L, { drawer: true }),
      this.groupLabel('Cattura · Voice', G * 4),
      this.frame('vc', G * 4, L, { pressed: 'voice', sheet: true })

  }

  renderVals() { return { view: this.view() }; }
}
