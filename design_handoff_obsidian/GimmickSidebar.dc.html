<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;} html,body{margin:0;}
  .gm-scroll::-webkit-scrollbar{width:10px;}
  .gm-scroll::-webkit-scrollbar-thumb{background:rgba(128,128,140,0.32);border-radius:6px;border:3px solid transparent;background-clip:content-box;}
  .gm-scroll::-webkit-scrollbar-track{background:transparent;}
</style>
</helmet>

<div style="background:#eceaef; font-family:'Geist',ui-sans-serif,system-ui,sans-serif; color:#1b1923; -webkit-font-smoothing:antialiased; padding:48px 40px 72px; min-width:880px;">
<div style="max-width:800px; margin:0 auto;">

  <div style="display:flex; align-items:center; gap:11px; margin-bottom:14px;">
    <div style="width:24px; height:24px; border-radius:7px; background:#7C5CCB; display:flex; align-items:center; justify-content:center;"><div style="width:8px; height:8px; border-radius:2.5px; background:#fff;"></div></div>
    <span style="font-size:12px; font-weight:600; letter-spacing:0.16em; color:#7a7589;">GIMMICK · SIDEBAR</span>
  </div>
  <h1 style="margin:0 0 8px; font-size:34px; font-weight:700; letter-spacing:-0.03em;">Sidebar sinistra · tag</h1>
  <p style="margin:0 0 38px; font-size:15px; line-height:1.55; color:#5c5868; max-width:600px;">Stessa logica della navbar: icone soft, hairline, accento solo sull'attivo. Le aree sono sezioni collassabili con guida d'indentazione; ogni tag porta il suo punto colore.</p>

  <div style="display:flex; gap:40px; align-items:flex-start;">
    <div>
      <div style="font-size:10px; font-weight:700; letter-spacing:0.18em; color:#9a96a4; margin-bottom:12px;">OBSIDIAN LIGHT</div>
      <div style="--sidebar:#fbfbfc;--surface2:#f1f0f4;--text:#1b1923;--muted:#5c5868;--subtle:#9a96a4;--line:rgba(24,20,38,0.09);--accent:#7C5CCB;--accent-ink:#ffffff;--accent-soft:#efeafb; width:280px; height:740px; border:1px solid rgba(24,20,38,0.1); border-radius:14px; overflow:hidden;">{{ sidebarLight }}</div>
    </div>
    <div>
      <div style="font-size:10px; font-weight:700; letter-spacing:0.18em; color:#9a96a4; margin-bottom:12px;">OBSIDIAN DARK</div>
      <div style="--sidebar:#262626;--surface2:#333333;--text:#dcdcdc;--muted:#9a9a9a;--subtle:#6e6e6e;--line:rgba(255,255,255,0.08);--accent:#AB9FF2;--accent-ink:#1b0d2e;--accent-soft:#2e2747; width:280px; height:740px; border:1px solid rgba(0,0,0,0.4); border-radius:14px; overflow:hidden;">{{ sidebarDark }}</div>
    </div>
  </div>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  get ICONS() {
    const S = (b) => '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + b + '</svg>';
    return {
      chevron: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5 10.5 8 6 12.5"/></svg>',
      pin: '<svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M8 1.6 9.05 6.05 13.5 7.1 9.05 8.15 8 12.6 6.95 8.15 2.5 7.1 6.95 6.05Z"/></svg>',
      expand: S('<path d="M5 6 8 3l3 3M5 10l3 3 3-3"/>'),
      home: S('<path d="M2.6 7.6 8 3.2l5.4 4.4M4 6.6V13h8V6.6"/>'),
      briefcase: S('<rect x="2.3" y="5" width="11.4" height="8" rx="1.5"/><path d="M5.5 5V3.9a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V5M2.3 8.6h11.4"/>'),
      person: S('<circle cx="8" cy="5.4" r="2.4"/><path d="M3.6 13.2a4.4 4.4 0 0 1 8.8 0"/>'),
      folder: S('<path d="M2.3 5.2a1 1 0 0 1 1-1h2.7l1.4 1.6h4.3a1 1 0 0 1 1 1v5.4a1 1 0 0 1-1 1H3.3a1 1 0 0 1-1-1Z"/>'),
      globe: S('<circle cx="8" cy="8" r="5.5"/><path d="M2.6 8h10.8M8 2.5c1.6 1.7 2.4 3.6 2.4 5.5S9.6 11.8 8 13.5C6.4 11.8 5.6 9.9 5.6 8S6.4 4.2 8 2.5Z"/>'),
      building: S('<rect x="3.2" y="2.6" width="9.6" height="10.8" rx="1"/><path d="M5.7 5.3h1.3M9 5.3h1.3M5.7 7.9h1.3M9 7.9h1.3M7 13.4v-2.3h2v2.3"/>'),
      sun: S('<circle cx="8" cy="8" r="2.7"/><path d="M8 1.9v1.5M8 12.6v1.5M14.1 8h-1.5M3.4 8H1.9M12.3 3.7l-1 1M4.7 11.3l-1 1M12.3 12.3l-1-1M4.7 4.7l-1-1"/>'),
      wave: S('<path d="M1.9 6.2c1.4-1.5 2.8-1.5 4.2 0s2.8 1.5 4.2 0 2.8-1.5 4.2 0M1.9 10c1.4-1.5 2.8-1.5 4.2 0s2.8 1.5 4.2 0 2.8-1.5 4.2 0"/>'),
      euro: S('<path d="M11.2 4.6a4 4 0 1 0 0 6.8M3.6 6.9h5M3.6 9.2h5"/>')
    };
  }
  glyph(name, size, color) {
    const px = (size || 16) + 'px';
    return React.createElement('span', { style: { width: px, height: px, display: 'inline-flex', flexShrink: 0, color: color || 'inherit' }, dangerouslySetInnerHTML: { __html: this.ICONS[name] } });
  }

  get GROUPS() {
    return [
      { name: 'Home', icon: 'home', color: '#6FCF97', open: true, children: [{ name: 'Home' }] },
      { name: 'Lavoro', icon: 'briefcase', color: '#5B8DEF', children: [] },
      { name: 'Persona', icon: 'person', color: '#AB9FF2', children: [] },
      { name: 'Progetto', icon: 'folder', color: '#E0B341', children: [] },
      { name: 'Contesto', icon: 'globe', color: '#E87DA0', children: [] },
      { name: 'Strutture', icon: 'building', color: '#EF6A6A', children: [] },
      { name: 'Golfo del Sole', icon: 'sun', color: '#E0B341', open: true, children: [
        { name: 'GDS_Fotovoltaico' }, { name: 'GDS_Permuta Viale I…' }, { name: 'GDS_Report', pin: true, active: true }, { name: 'GDS_Varie' }
      ] },
      { name: 'Ortano Mare', icon: 'wave', color: '#5B8DEF', open: true, children: [
        { name: 'OM La Villa 1' }, { name: 'OM Cartelli Rotonda' }, { name: 'OM Le ville 26/27' }, { name: 'OM Report', pin: true },
        { name: 'OM Unicoop' }, { name: 'OM Varie' }, { name: 'OM Zona Albergo' }, { name: 'OM Zona Spiaggia' }, { name: 'OM_Padel' }
      ] },
      { name: 'Money', icon: 'euro', color: '#6FCF97', open: true, children: [{ name: 'Agenzia Entrate' }, { name: 'Commercialista' }] }
    ];
  }

  child(c, ci) {
    const h = React.createElement;
    const active = !!c.active;
    return h('div', { key: c.name + ci, style: {
      display: 'flex', alignItems: 'center', gap: '7px', padding: '6px 9px', borderRadius: '7px', cursor: 'default',
      background: active ? 'var(--accent-soft)' : 'transparent', color: active ? 'var(--accent)' : 'var(--muted)'
    } },
      h('span', { style: { fontSize: '13px', fontWeight: active ? 600 : 500, flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, c.name),
      c.pin ? this.glyph('pin', 12, active ? 'var(--accent)' : 'var(--subtle)') : null
    );
  }

  group(g) {
    const h = React.createElement;
    const chevron = h('span', { style: { width: '13px', height: '13px', display: 'inline-flex', flexShrink: 0, color: 'var(--subtle)', transform: g.open ? 'rotate(90deg)' : 'none' }, dangerouslySetInnerHTML: { __html: this.ICONS.chevron } });
    const header = h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '7px 8px', borderRadius: '8px', cursor: 'default' } },
      chevron, this.glyph(g.icon, 16, g.color),
      h('span', { style: { fontSize: '13px', fontWeight: 600, color: 'var(--text)', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, g.name)
    );
    let kids = null;
    if (g.open && g.children.length) {
      kids = h('div', { style: { marginLeft: '14px', paddingLeft: '12px', borderLeft: '1px solid var(--line)', marginTop: '1px', marginBottom: '3px' } }, g.children.map((c, ci) => this.child(c, ci)));
    }
    return h('div', { key: g.name, style: { marginBottom: '1px' } }, header, kids);
  }

  sidebar() {
    const h = React.createElement;
    const logo = h('div', { style: { display: 'flex', alignItems: 'center', gap: '9px', padding: '2px 6px 14px' } },
      h('div', { style: { width: '26px', height: '26px', borderRadius: '8px', background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, h('div', { style: { width: '8px', height: '8px', borderRadius: '2.5px', background: 'var(--accent-ink)' } })),
      h('span', { style: { fontSize: '16px', fontWeight: 600, letterSpacing: '-0.01em', color: 'var(--text)' } }, 'Gimmick'),
      h('div', { style: { flex: 1 } }),
      h('span', { style: { fontSize: '11px', fontWeight: 600, color: 'var(--muted)', background: 'var(--surface2)', padding: '2px 8px', borderRadius: '7px', fontFamily: "'Geist Mono',monospace" } }, '26')
    );
    const segBtn = (label, active, icon) => h('div', { key: label, style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', padding: '7px 10px', borderRadius: '8px', fontSize: '12.5px', fontWeight: active ? 600 : 500, color: active ? 'var(--accent)' : 'var(--muted)', background: active ? 'var(--accent-soft)' : 'transparent', cursor: 'default' } }, icon ? this.glyph(icon, 13) : null, h('span', {}, label));
    const seg = h('div', { style: { display: 'flex', gap: '3px', background: 'var(--surface2)', border: '1px solid var(--line)', borderRadius: '10px', padding: '3px', marginBottom: '4px' } }, segBtn('Tutti i tag', true), segBtn('Pinned · 2', false, 'pin'));
    const expand = h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '6px', padding: '6px 6px 10px', color: 'var(--subtle)', fontSize: '12px', fontWeight: 500, cursor: 'default', whiteSpace: 'nowrap' } }, this.glyph('expand', 14), h('span', {}, 'Espandi tutto'));
    const tree = this.GROUPS.map((g) => this.group(g));
    return h('div', { className: 'gm-scroll', style: { height: '100%', overflowY: 'auto', overflowX: 'hidden', padding: '16px 12px', background: 'var(--sidebar)' } }, logo, seg, expand, ...tree);
  }

  renderVals() {
    return { sidebarLight: this.sidebar(), sidebarDark: this.sidebar() };
  }
}
</script>
</body>
</html>
