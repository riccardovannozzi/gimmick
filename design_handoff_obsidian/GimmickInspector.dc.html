<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;} html,body{margin:0;}
  .gm-scroll::-webkit-scrollbar{width:10px;}
  .gm-scroll::-webkit-scrollbar-thumb{background:rgba(128,128,140,0.32);border-radius:6px;border:3px solid transparent;background-clip:content-box;}
  .gm-scroll::-webkit-scrollbar-track{background:transparent;}
</style>
</helmet>

<div style="background:#eceaef; font-family:'Geist',ui-sans-serif,system-ui,sans-serif; color:#1b1923; -webkit-font-smoothing:antialiased; padding:48px 40px 72px; min-width:900px;">
<div style="max-width:820px; margin:0 auto;">

  <div style="display:flex; align-items:center; gap:11px; margin-bottom:14px;">
    <div style="width:24px; height:24px; border-radius:7px; background:#7C5CCB; display:flex; align-items:center; justify-content:center;"><div style="width:8px; height:8px; border-radius:2.5px; background:#fff;"></div></div>
    <span style="font-size:12px; font-weight:600; letter-spacing:0.16em; color:#7a7589;">GIMMICK · INSPECTOR</span>
  </div>
  <h1 style="margin:0 0 8px; font-size:34px; font-weight:700; letter-spacing:-0.03em;">Sidebar destra · dettaglio tile</h1>
  <p style="margin:0 0 38px; font-size:15px; line-height:1.55; color:#5c5868; max-width:600px;">Editor del tile: metadati, evento, tag e sparks. Eyebrow in maiuscoletto, campi recessi con hairline, capture come tinte morbide.</p>

  <div style="display:flex; gap:40px; align-items:flex-start;">
    <div>
      <div style="font-size:10px; font-weight:700; letter-spacing:0.18em; color:#9a96a4; margin-bottom:12px;">OBSIDIAN LIGHT</div>
      <div style="--panel:#fbfbfc;--field:#ffffff;--surface2:#f1f0f4;--text:#1b1923;--muted:#5c5868;--subtle:#9a96a4;--line:rgba(24,20,38,0.09);--line2:rgba(24,20,38,0.15);--accent:#7C5CCB;--accent-ink:#ffffff;--accent-soft:#efeafb;--media:#e9e7ee; width:312px; height:860px; border:1px solid rgba(24,20,38,0.1); border-radius:14px; overflow:hidden;">{{ inspectorLight }}</div>
    </div>
    <div>
      <div style="font-size:10px; font-weight:700; letter-spacing:0.18em; color:#9a96a4; margin-bottom:12px;">OBSIDIAN DARK</div>
      <div style="--panel:#262626;--field:#1e1e1e;--surface2:#333333;--text:#dcdcdc;--muted:#9a9a9a;--subtle:#6e6e6e;--line:rgba(255,255,255,0.08);--line2:rgba(255,255,255,0.14);--accent:#AB9FF2;--accent-ink:#1b0d2e;--accent-soft:#2e2747;--media:#161616; width:312px; height:860px; border:1px solid rgba(0,0,0,0.4); border-radius:14px; overflow:hidden;">{{ inspectorDark }}</div>
    </div>
  </div>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  get ICONS() {
    const S = (b) => '<svg viewBox="0 0 16 16" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">' + b + '</svg>';
    return {
      panel: S('<rect x="2.2" y="2.6" width="11.6" height="10.8" rx="1.6"/><path d="M6.4 2.6v10.8"/>'),
      edit: S('<path d="M9.5 3.2 12.8 6.5 6 13.3l-3.3.6.6-3.3z"/><path d="M9.5 3.2 12.8 6.5"/>'),
      list: S('<path d="M5.5 4.5h8M5.5 8h8M5.5 11.5h8M2.6 4.5h.01M2.6 8h.01M2.6 11.5h.01"/>'),
      flow: S('<circle cx="3.6" cy="8" r="1.7"/><circle cx="12.4" cy="4.2" r="1.7"/><circle cx="12.4" cy="11.8" r="1.7"/><path d="M5.2 7.3 10.8 4.9M5.2 8.7l5.6 2.4"/>'),
      note: S('<path d="M4 2.6h6l2.6 2.6V13a.6.6 0 0 1-.6.6H4a.6.6 0 0 1-.6-.6V3.2A.6.6 0 0 1 4 2.6Z"/><path d="M9.6 2.6v3h3M6 9h4M6 11h4"/>'),
      todo: S('<rect x="2.6" y="2.6" width="10.8" height="10.8" rx="2"/><path d="M5.4 8.2 7.2 10l3.6-4"/>'),
      due: S('<circle cx="8" cy="8" r="5.6"/><path d="M8 5v3.4M8 10.7h.01"/>'),
      allday: S('<rect x="2.4" y="3.4" width="11.2" height="10" rx="1.6"/><path d="M2.4 6.4h11.2M5.4 2.2v2.4M10.6 2.2v2.4"/>'),
      timed: S('<circle cx="8" cy="8.4" r="5.4"/><path d="M8 5.4v3l2 1.4"/>'),
      calendar: S('<rect x="2.4" y="3.4" width="11.2" height="10" rx="1.6"/><path d="M2.4 6.4h11.2M5.4 2.2v2.4M10.6 2.2v2.4"/>'),
      clock: S('<circle cx="8" cy="8" r="5.5"/><path d="M8 5v3l2 1.4"/>'),
      tag: '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M2.6 7.7V3.3a.7.7 0 0 1 .7-.7h4.4a1 1 0 0 1 .7.3l5 5a1 1 0 0 1 0 1.4l-4.4 4.4a1 1 0 0 1-1.4 0l-5-5a1 1 0 0 1-.3-.7Z"/><circle cx="5.5" cy="5.5" r="0.9" fill="currentColor" stroke="none"/></svg>',
      call: S('<path d="M3 3.4c-.4.4-.6 1-.5 1.6.5 3.2 3.3 6 6.5 6.5.6.1 1.2-.1 1.6-.5l.9-.9a.8.8 0 0 0-.1-1.2l-1.7-1.2a.8.8 0 0 0-.9 0l-.6.4a7 7 0 0 1-2.5-2.5l.4-.6a.8.8 0 0 0 0-.9L4.4 2.9a.8.8 0 0 0-1.2-.1z"/>'),
      check: S('<circle cx="8" cy="8" r="5.6"/><path d="M5.6 8.2 7.3 10l3.3-3.8"/>'),
      doc: S('<path d="M4 2.6h5.4L12.6 5.8V13a.6.6 0 0 1-.6.6H4a.6.6 0 0 1-.6-.6V3.2A.6.6 0 0 1 4 2.6Z"/><path d="M9.2 2.6v3.2h3.2"/>'),
      photo: S('<rect x="2.2" y="4" width="11.6" height="9" rx="1.8"/><circle cx="8" cy="8.4" r="2.4"/><path d="M5.6 4l.9-1.4h3l.9 1.4"/>'),
      video: S('<rect x="2.2" y="4.2" width="8.4" height="7.6" rx="1.6"/><path d="M10.6 6.6 13.8 5v6l-3.2-1.6z"/>'),
      gallery: S('<rect x="4.2" y="2.4" width="9.4" height="9.4" rx="1.6"/><path d="M2.4 5v8a1 1 0 0 0 1 1h7.6"/>'),
      text: S('<path d="M4 4h8M4 7h8M4 10h5"/>'),
      voice: S('<rect x="6" y="2.2" width="4" height="7.2" rx="2"/><path d="M3.8 8a4.2 4.2 0 0 0 8.4 0M8 12.2v1.6"/>'),
      file: S('<path d="M11.5 7.5 8 11a2.4 2.4 0 0 1-3.4-3.4l4-4a1.6 1.6 0 0 1 2.3 2.3l-4 4a.8.8 0 0 1-1.2-1.2L9 5.6"/>'),
      chev: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6.5 8 10.5 12 6.5"/></svg>'
    };
  }
  glyph(name, size, color) { const px = (size || 16) + 'px'; return React.createElement('span', { style: { width: px, height: px, display: 'inline-flex', flexShrink: 0, color: color || 'inherit' }, dangerouslySetInnerHTML: { __html: this.ICONS[name] } }); }

  eyebrow(t) { return React.createElement('div', { style: { fontSize: '10px', fontWeight: 700, letterSpacing: '0.13em', color: 'var(--subtle)', margin: '0 0 7px' } }, t); }

  field(opts) {
    const h = React.createElement;
    return h('div', { style: { display: 'flex', alignItems: 'center', gap: '9px', background: 'var(--field)', border: '1px solid var(--line2)', borderRadius: '8px', padding: '9px 11px' } },
      opts.icon ? this.glyph(opts.icon, 15, opts.iconColor || 'var(--subtle)') : null,
      h('span', { style: { fontSize: '13px', fontWeight: opts.strong ? 500 : 400, color: opts.muted ? 'var(--subtle)' : 'var(--text)', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, opts.value),
      opts.chev ? this.glyph('chev', 13, 'var(--subtle)') : null
    );
  }

  segItem(label, active, icon) {
    return React.createElement('div', { key: label, style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', padding: '7px 8px', borderRadius: '7px', fontSize: '12px', fontWeight: active ? 600 : 500, color: active ? 'var(--accent)' : 'var(--muted)', background: active ? 'var(--accent-soft)' : 'transparent', cursor: 'default', whiteSpace: 'nowrap' } }, icon ? this.glyph(icon, 13) : null, React.createElement('span', {}, label));
  }
  segGroup(items) { return React.createElement('div', { style: { display: 'flex', gap: '3px', background: 'var(--surface2)', border: '1px solid var(--line)', borderRadius: '10px', padding: '3px' } }, items.map((it) => this.segItem(it[0], it[1], it[2]))); }

  inspector() {
    const h = React.createElement;
    const section = (eyebrow, body, mt) => h('div', { style: { marginTop: mt || '18px' } }, this.eyebrow(eyebrow), body);

    // top bar
    const topBar = h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '11px 12px', borderBottom: '1px solid var(--line)', flexShrink: 0 } },
      h('div', { style: { width: '32px', height: '32px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted)', border: '1px solid var(--line)' } }, this.glyph('panel', 16)),
      h('div', { style: { flex: 1 } }, this.segGroup([['Edit', true, 'edit'], ['List', false, 'list'], ['Flow', false, 'flow']]))
    );

    // sparks buttons — square, English label, centered
    const caps = [['photo', '#4F86EE', 'Photo'], ['video', '#E0588C', 'Video'], ['gallery', '#8C7BE0', 'Gallery'], ['text', '#3FAE72', 'Text'], ['voice', '#E0544F', 'Voice'], ['file', '#C99220', 'File']];
    const capBtn = (c, i) => h('div', { key: c[0], style: { flex: 1, padding: '10px 2px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '4px', borderLeft: i === 0 ? 'none' : '1px solid var(--line)' } }, this.glyph(c[0], 16, c[1]), h('span', { style: { fontSize: '9px', fontWeight: 600, letterSpacing: '0.01em', color: 'var(--subtle)' } }, c[2]));

    // text spark card
    const textCard = h('div', { style: { background: 'var(--field)', border: '1px solid var(--line)', borderRadius: '10px', overflow: 'hidden', marginTop: '12px' } },
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '7px', padding: '9px 11px', borderBottom: '1px solid var(--line)', color: 'var(--muted)' } }, this.glyph('text', 14, '#3FAE72'), h('span', { style: { fontSize: '11px', fontWeight: 700, letterSpacing: '0.1em', color: 'var(--subtle)' } }, 'TESTO')),
      h('div', { style: { padding: '11px', fontSize: '12.5px', lineHeight: 1.55, color: 'var(--muted)', maxHeight: '92px', overflow: 'hidden' } }, 'Abbiamo n\u00b03 D-matrix (per ricevere segnale satellitare) ed una centrale Galaxia ( gi\u00e0 installata sul tetto\u2026)')
    );

    // media spark
    const media = h('div', { style: { marginTop: '10px', height: '108px', borderRadius: '10px', background: 'var(--media)', border: '1px solid var(--line)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '8px', color: 'var(--subtle)' } },
      h('div', { style: { width: '36px', height: '36px', borderRadius: '50%', background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--accent-ink)' } }, this.glyph('video', 17)),
      h('span', { style: { fontSize: '12px', fontWeight: 500, color: 'var(--muted)' } }, 'Registrazione call \u00b7 02:14')
    );

    const body = h('div', { className: 'gm-scroll', style: { flex: 1, overflowY: 'auto', overflowX: 'hidden', padding: '16px 14px 24px' } },
      section('TITOLO', this.field({ value: 'OM/call con barbini', strong: true }), '2px'),
      section('AZIONE', h('div', { style: { display: 'flex', gap: '8px' } },
        h('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '7px', padding: '8px', borderRadius: '8px', background: 'var(--field)', border: '1px solid var(--line2)', fontSize: '13px', fontWeight: 500, color: 'var(--text)' } }, this.glyph('note', 15, 'var(--muted)'), 'Note'),
        h('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '7px', padding: '8px', borderRadius: '8px', background: 'var(--field)', border: '1px solid var(--line2)', fontSize: '13px', fontWeight: 500, color: 'var(--text)' } }, this.glyph('todo', 15, 'var(--muted)'), 'To-do')
      )),
      h('div', { style: { marginTop: '12px' } }, this.segGroup([['Scadenza', false, 'due'], ['Giornata', false, 'allday'], ['A orario', true, 'timed']])),
      section('DATA E ORARIO', h('div', { style: { display: 'flex', gap: '8px' } },
        h('div', { style: { flex: '1.4' } }, this.field({ value: '22/06/2026', icon: 'calendar' })),
        h('div', { style: { flex: '1' } }, this.field({ value: '11:00', icon: 'clock' })),
        h('div', { style: { flex: '1' } }, this.field({ value: '12:00' }))
      )),
      section('TAG', h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', width: '100%', background: 'var(--accent-soft)', border: '1px solid var(--line)', borderRadius: '8px', padding: '9px 11px', fontSize: '13px', fontWeight: 500, color: 'var(--accent)' } }, this.glyph('tag', 15), 'Gimmick')),
      section('TIPO', this.field({ value: 'Call', icon: 'call', iconColor: 'var(--muted)', chev: true })),
      section('STATO', this.field({ value: 'Done', icon: 'check', iconColor: '#3FAE72', chev: true })),
      h('div', { style: { height: '1px', background: 'var(--line)', margin: '20px 0 0' } }),
      section('SPARKS \u00b7 3', h('div', { style: { display: 'flex', background: 'var(--field)', border: '1px solid var(--line2)', borderRadius: '8px', overflow: 'hidden' } }, caps.map((c, i) => capBtn(c, i)))),
      textCard, media
    );

    return h('div', { style: { height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--panel)' } }, topBar, body);
  }

  renderVals() { return { inspectorLight: this.inspector(), inspectorDark: this.inspector() }; }
}
</script>
</body>
</html>
